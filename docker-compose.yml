version: '3.8'

services:
  mongo:
    image: mongo
    container_name: mongo-server
    restart: always
    volumes:
      - ./data:/data/db
    ports:
      - 27017:27017

  app:
    build: .
    container_name: resepti-api
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    restart: always
